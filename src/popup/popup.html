<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-i18n="app.name"></title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body class="popup-shell">
    <div id="notifications" class="toast-stack toast-stack--popup" aria-live="polite" aria-atomic="true"></div>
    <header class="app-header app-header--compact">
      <div class="brand">
        <img data-favicon="48" src="../shared/imgs/favicons/v2/Altreurl_48.png" alt="" width="40" height="40">
        <div>
          <h1 data-i18n="app.name"></h1>
          <p id="summary" data-i18n="popup.summary.loading"></p>
        </div>
      </div>
    </header>
    <main>
      <label class="search-field search-field--popup">
        <img data-icon="icons8-search-in-list-32.png" src="../shared/imgs/icons/b/icons8-search-in-list-32.png" alt="" width="16" height="16">
        <input id="ruleSearch" type="search" data-i18n-placeholder="popup.search.placeholder">
      </label>
      <div id="activeRules" class="popup-rules"></div>
      <button id="openOptions" class="icon-button" type="button">
        <img data-icon="icons8-list-32.png" src="../shared/imgs/icons/b/icons8-list-32.png" alt="" width="16" height="16">
        <span data-i18n="popup.openRules"></span>
      </button>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
