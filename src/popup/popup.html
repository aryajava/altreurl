<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Altreurl</title>
    <link rel="stylesheet" href="../shared/styles.css">
  </head>
  <body class="popup-shell">
    <div id="notifications" class="toast-stack toast-stack--popup" aria-live="polite" aria-atomic="true"></div>
    <header class="app-header app-header--compact">
      <div class="brand">
        <img src="../shared/imgs/icons/Altreurl-48.png" alt="" width="40" height="40">
        <div>
          <h1>Altreurl</h1>
          <p id="summary">Loading rules...</p>
        </div>
      </div>
    </header>
    <main>
      <label class="search-field search-field--popup">
        <img src="../shared/imgs/icons/icons8-search-in-list-32.png" alt="" width="16" height="16">
        <input id="ruleSearch" type="search" placeholder="Search active rules">
      </label>
      <div id="activeRules" class="popup-rules"></div>
      <button id="openOptions" class="icon-button" type="button">
        <img src="../shared/imgs/icons/icons8-list-32.png" alt="" width="16" height="16">
        Open rules
      </button>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
