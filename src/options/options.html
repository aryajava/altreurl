<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Altreurl Options</title>
    <link rel="stylesheet" href="../shared/styles.css">
  </head>
  <body>
    <div id="notifications" class="toast-stack toast-stack--options" aria-live="polite" aria-atomic="true"></div>
    <main class="options-shell">
      <header class="page-header app-header">
        <div class="brand">
          <img src="../shared/imgs/icons/Altreurl-64.png" alt="" width="48" height="48">
          <div>
            <h1>Altreurl</h1>
            <p>Manage local debugging redirects and request header overrides.</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="themePreference" class="theme-toggle" type="button" aria-pressed="false" title="Switch between dark and light mode">
            <span class="theme-toggle__option theme-toggle__option--dark">
              <img src="../shared/imgs/icons/icons8-moon-and-stars-32.png" alt="" width="16" height="16">
              Dark
            </span>
            <span class="theme-toggle__thumb" aria-hidden="true"></span>
            <span class="theme-toggle__option theme-toggle__option--light">
              <img src="../shared/imgs/icons/icons8-sun-32.png" alt="" width="16" height="16">
              Light
            </span>
          </button>
          <button id="importRules" class="icon-button" type="button" title="Import rules from a JSON file as drafts">
            <img src="../shared/imgs/icons/icons8-import-32.png" alt="" width="16" height="16">
            Import
          </button>
          <button id="addRule" class="icon-button" type="button" title="Create a new draft rule">
            <img src="../shared/imgs/icons/icons8-add-32.png" alt="" width="16" height="16">
            Add rule
          </button>
          <input id="importRulesFile" type="file" accept="application/json,.json" hidden>
        </div>
      </header>

      <section class="options-layout">
        <aside class="rule-list-panel">
          <div class="panel-title">
            <strong class="panel-title__label">
              <img src="../shared/imgs/icons/icons8-list-32.png" alt="" width="16" height="16">
              Rules
            </strong>
            <span id="ruleCount"></span>
          </div>
          <button id="toggleRuleControls" class="filter-toggle" type="button" aria-expanded="false" title="Show or hide search and filter controls">
            <span class="filter-toggle__label">
              <img src="../shared/imgs/icons/icons8-filter-edit-32.png" alt="" width="16" height="16">
              <span data-role="filterToggleLabel">Show search and filters</span>
            </span>
            <span class="filter-toggle__icon" aria-hidden="true"></span>
          </button>
          <div id="ruleListControls" class="rule-list-controls" hidden>
            <label class="search-field">
              <img src="../shared/imgs/icons/icons8-search-32.png" alt="" width="16" height="16">
              <input id="ruleSearch" type="search" placeholder="Search rules" title="Search by rule name, group, source URL, or target URL">
            </label>
            <select id="statusFilter" aria-label="Status filter" title="Filter rules by computed status">
              <option value="all">All statuses</option>
              <option value="draft">Draft</option>
              <option value="waiting">Waiting sync</option>
              <option value="ready">Ready</option>
              <option value="enabled">Enabled</option>
              <option value="disabled">Disabled</option>
              <option value="invalid">Invalid</option>
            </select>
            <select id="groupFilter" aria-label="Group filter" title="Filter rules by group">
              <option value="all">All groups</option>
            </select>
            <select id="credentialFilter" aria-label="Credential filter" title="Filter rules by credential mode">
              <option value="all">All credentials</option>
              <option value="manual">Manual</option>
              <option value="sync">Sync from source</option>
            </select>
          </div>
          <div id="bulkToolbar" class="bulk-toolbar" hidden>
            <div class="bulk-toolbar__summary">
              <label title="Select or clear all currently visible rules">
                <input id="selectVisibleRules" type="checkbox">
                <span id="selectedRuleCount">0 selected</span>
              </label>
              <button id="bulkExport" class="icon-button" type="button" title="Export selected rules, or all rules when none are selected">
                <img src="../shared/imgs/icons/icons8-export-32.png" alt="" width="16" height="16">
                Export all
              </button>
            </div>
            <div class="bulk-actions" data-role="bulkActions" hidden>
              <button id="bulkEnable" type="button" title="Enable selected saved or draft rules">Enable</button>
              <button id="bulkDisable" type="button" title="Disable selected saved or draft rules">Disable</button>
              <button id="bulkDuplicate" type="button" title="Duplicate selected rules as drafts">Duplicate</button>
              <button id="bulkRemove" class="icon-button" type="button" title="Remove selected rules">
                <img src="../shared/imgs/icons/icons8-remove-32.png" alt="" width="16" height="16">
                Remove
              </button>
              <input id="bulkGroupName" type="text" placeholder="Move to group" title="Group name for selected rules">
              <button id="bulkMoveGroup" type="button" title="Move selected rules to this group">Move</button>
            </div>
          </div>
          <div id="rulesList" class="rule-list" aria-live="polite"></div>
        </aside>

        <section id="editorPanel" class="editor-panel" aria-live="polite"></section>
      </section>

    </main>

    <template id="ruleListItemTemplate">
      <div class="rule-list-row">
        <input class="rule-select" data-role="ruleSelect" type="checkbox" title="Select this rule for bulk actions">
        <button class="rule-list-item" type="button">
          <span class="rule-list-item__title">
            <span data-role="ruleName"></span>
            <span class="rule-badge" data-role="statusBadge"></span>
          </span>
          <span class="rule-list-item__meta">
            <small data-role="ruleGroup"></small>
            <small data-role="ruleMeta"></small>
          </span>
        </button>
      </div>
    </template>

    <template id="emptyEditorTemplate">
      <div class="empty-editor">
        <div class="empty-editor__content">
          <span class="empty-editor__mark" aria-hidden="true">+</span>
          <h2>No rule selected</h2>
          <p>Select a rule from the list or create a new draft rule.</p>
          <button data-action="addEmptyRule" class="icon-button" type="button" title="Create a new draft rule">
            <img src="../shared/imgs/icons/icons8-add-32.png" alt="" width="16" height="16">
            Add rule
          </button>
        </div>
      </div>
    </template>

    <template id="ruleTemplate">
      <article class="rule-editor">
        <div class="rule-editor__header">
          <div class="rule-state">
            <label>
              <input data-field="enabled" type="checkbox">
              Enabled
            </label>
            <span class="rule-badge" data-role="editorStatusBadge"></span>
            <span class="rule-badge" data-role="editorDraftBadge" hidden>Draft</span>
          </div>
          <div class="rule-actions">
            <button data-action="saveRule" class="icon-button" type="button" title="Save only this selected rule">
              <img src="../shared/imgs/icons/icons8-save-32.png" alt="" width="16" height="16">
              <span data-role="saveRuleLabel">Save Rule</span>
            </button>
            <button data-action="removeRule" class="icon-button" type="button" title="Remove this rule. Draft rules are removed only from this page.">
              <img src="../shared/imgs/icons/icons8-remove-32.png" alt="" width="16" height="16">
              Remove
            </button>
          </div>
        </div>

        <section class="editor-section">
          <div class="editor-section__title">
            <strong>Rule details</strong>
          </div>
          <div class="editor-grid editor-grid--meta">
            <label>
              Name
              <input data-field="name" type="text" placeholder="Local backend" title="Human-readable rule name shown in the rules list">
            </label>

            <label>
              Group
              <input data-field="group" type="text" placeholder="Ungrouped" title="Optional group label for organizing related rules">
            </label>

            <label>
              Pattern format
              <select data-field="patternType" title="Wildcard is simpler; regex allows capture groups and precise matching">
                <option value="wildcard">Wildcard</option>
                <option value="regex">Regex</option>
              </select>
            </label>
          </div>
        </section>

        <section class="editor-section">
          <div class="editor-section__title">
            <strong>Routing</strong>
          </div>
          <div class="editor-grid">
            <label class="span-2">
              Source URL pattern
              <input data-field="sourcePattern" type="text" placeholder="https://api.example.test/*" title="Request URL pattern to match before redirect">
            </label>

            <label class="span-2">
              Redirect target URL
              <input data-field="targetUrl" type="text" placeholder="http://localhost:3000/users/*" title="Target URL that receives the redirected request">
            </label>
          </div>
        </section>

        <section class="editor-section">
          <div class="editor-section__title">
            <strong>Credentials</strong>
          </div>
          <div class="editor-grid editor-grid--credentials">
            <label>
              Credential mode
              <select data-field="credentialMode" title="Manual uses typed headers; sync tries to reuse credentials from the source app">
                <option value="manual">Manual</option>
                <option value="sync">Sync from source</option>
              </select>
            </label>

            <label data-role="manualAuthorization">
              Authorization
              <input data-field="authorization" type="text" placeholder="Bearer local-token" title="Manual Authorization header value">
            </label>
          </div>
        </section>

        <fieldset class="sync-block" data-role="syncOptions">
          <legend>Sync from source request</legend>
          <p class="sync-note">
            Request learning needs one source request to capture credentials first. If the values are not available from storage or cookies, the first run uses learning mode and the next run applies the redirect.
          </p>
          <div class="sync-options">
            <label>
              <input data-field="syncHeaders" type="checkbox">
              Headers
            </label>
            <label>
              <input data-field="syncAuthorization" type="checkbox">
              Authorization
            </label>
            <label>
              <input data-field="syncCookies" type="checkbox">
              Session cookies
            </label>
          </div>
          <div class="source-grid">
            <label>
              Credential source
              <select data-field="credentialSource">
                <option value="request">Request learning</option>
                <option value="storage">Browser storage</option>
                <option value="cookie">Cookies</option>
              </select>
            </label>

            <label data-role="storageAreaField">
              Storage area
              <select data-field="storageArea">
                <option value="localStorage">localStorage</option>
                <option value="sessionStorage">sessionStorage</option>
              </select>
            </label>

            <label data-role="authorizationKeyField">
              Authorization key/name
              <input data-field="authorizationKey" type="text" placeholder="access_token">
            </label>

            <label data-role="authorizationPrefixField">
              Authorization prefix
              <input data-field="authorizationPrefix" type="text" placeholder="Bearer ">
            </label>

            <label data-role="headersKeyField">
              Headers storage key
              <input data-field="headersKey" type="text" placeholder="debug_headers">
            </label>

            <label class="span-2" data-role="cookieNamesField">
              Cookie names
              <input data-field="cookieNames" type="text" placeholder="session_state, i18next">
            </label>
          </div>
          <span data-role="syncStatus" class="sync-status"></span>
          <div class="sync-preview" data-role="syncPreview" hidden>
            <div class="sync-tabs" data-role="syncTabs" role="tablist" aria-label="Synced credential preview"></div>
            <div class="sync-preview-content" data-role="syncPreviewContent"></div>
          </div>
        </fieldset>

        <div class="headers-block" data-role="manualHeaders">
          <div class="headers-block__title">
            <strong>Headers</strong>
            <button data-action="addHeader" class="icon-button" type="button">
              <img src="../shared/imgs/icons/icons8-add-32.png" alt="" width="16" height="16">
              Add header
            </button>
          </div>
          <div data-role="headers"></div>
        </div>
      </article>
    </template>

    <template id="headerTemplate">
      <div class="header-row">
        <input data-field="headerName" type="text" placeholder="X-Debug-User">
        <input data-field="headerValue" type="text" placeholder="local">
        <button data-action="removeHeader" type="button">Remove</button>
      </div>
    </template>

    <script type="module" src="./options.js"></script>
  </body>
</html>
