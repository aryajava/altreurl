<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Altreurl Options</title>
    <link rel="stylesheet" href="../shared/styles.css">
  </head>
  <body>
    <div id="notifications" class="toast-stack" aria-live="polite" aria-atomic="true"></div>
    <main class="options-shell">
      <header class="page-header app-header">
        <div class="brand">
          <img src="../shared/imgs/icons/Altreurl-64.png" alt="" width="48" height="48">
          <div>
            <h1>Altreurl</h1>
            <p>Manage local debugging redirects and request header overrides.</p>
          </div>
        </div>
        <div class="header-actions">
          <label class="theme-field">
            Theme
            <select id="themePreference">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
          <button id="addRule" type="button">Add rule</button>
        </div>
      </header>

      <section class="options-layout">
        <aside class="rule-list-panel">
          <div class="panel-title">
            <strong>Rules</strong>
            <span id="ruleCount"></span>
          </div>
          <button id="toggleRuleControls" class="filter-toggle" type="button" aria-expanded="false">
            Show search and filters
          </button>
          <div id="ruleListControls" class="rule-list-controls" hidden>
            <input id="ruleSearch" type="search" placeholder="Search rules">
            <select id="statusFilter" aria-label="Status filter">
              <option value="all">All statuses</option>
              <option value="enabled">Enabled</option>
              <option value="disabled">Disabled</option>
            </select>
            <select id="credentialFilter" aria-label="Credential filter">
              <option value="all">All credentials</option>
              <option value="manual">Manual</option>
              <option value="sync">Sync from source</option>
            </select>
          </div>
          <div id="rulesList" class="rule-list" aria-live="polite"></div>
        </aside>

        <section id="editorPanel" class="editor-panel" aria-live="polite"></section>
      </section>

    </main>

    <template id="ruleListItemTemplate">
      <button class="rule-list-item" type="button">
        <span data-role="ruleName"></span>
        <small data-role="ruleMeta"></small>
      </button>
    </template>

    <template id="emptyEditorTemplate">
      <div class="empty-editor">
        <h2>No rule selected</h2>
        <p>Add or select a rule.</p>
      </div>
    </template>

    <template id="ruleTemplate">
      <article class="rule-editor">
        <div class="rule-editor__header">
          <label>
            <input data-field="enabled" type="checkbox">
            Enabled
          </label>
          <div class="rule-actions">
            <button data-action="saveRule" type="button">Save Rule</button>
            <button data-action="removeRule" type="button">Remove</button>
          </div>
        </div>

        <div class="editor-grid">
          <label>
            Name
            <input data-field="name" type="text" placeholder="Local backend">
          </label>

          <label>
            Pattern format
            <select data-field="patternType">
              <option value="wildcard">Wildcard</option>
              <option value="regex">Regex</option>
            </select>
          </label>

          <label class="span-2">
            Source URL pattern
            <input data-field="sourcePattern" type="text" placeholder="https://api.example.test/*">
          </label>

          <label class="span-2">
            Redirect target URL
            <input data-field="targetUrl" type="text" placeholder="http://localhost:3000/users/*">
          </label>

          <label>
            Credential mode
            <select data-field="credentialMode">
              <option value="manual">Manual</option>
              <option value="sync">Sync from source</option>
            </select>
          </label>

          <label data-role="manualAuthorization">
            Authorization
            <input data-field="authorization" type="text" placeholder="Bearer local-token">
          </label>
        </div>

        <fieldset class="sync-block" data-role="syncOptions">
          <legend>Sync from source request</legend>
          <p class="sync-note">
            Request learning needs one source request to capture credentials first. If the values are not available from storage or cookies, the first run uses learning mode and the next run applies the redirect.
          </p>
          <div class="sync-options">
            <label>
              <input data-field="syncHeaders" type="checkbox">
              Headers
            </label>
            <label>
              <input data-field="syncAuthorization" type="checkbox">
              Authorization
            </label>
            <label>
              <input data-field="syncCookies" type="checkbox">
              Session cookies
            </label>
          </div>
          <div class="source-grid">
            <label>
              Credential source
              <select data-field="credentialSource">
                <option value="request">Request learning</option>
                <option value="storage">Browser storage</option>
                <option value="cookie">Cookies</option>
              </select>
            </label>

            <label data-role="storageAreaField">
              Storage area
              <select data-field="storageArea">
                <option value="localStorage">localStorage</option>
                <option value="sessionStorage">sessionStorage</option>
              </select>
            </label>

            <label data-role="authorizationKeyField">
              Authorization key/name
              <input data-field="authorizationKey" type="text" placeholder="access_token">
            </label>

            <label data-role="authorizationPrefixField">
              Authorization prefix
              <input data-field="authorizationPrefix" type="text" placeholder="Bearer ">
            </label>

            <label data-role="headersKeyField">
              Headers storage key
              <input data-field="headersKey" type="text" placeholder="debug_headers">
            </label>

            <label class="span-2" data-role="cookieNamesField">
              Cookie names
              <input data-field="cookieNames" type="text" placeholder="session_state, i18next">
            </label>
          </div>
          <span data-role="syncStatus" class="sync-status"></span>
        </fieldset>

        <div class="headers-block" data-role="manualHeaders">
          <div class="headers-block__title">
            <strong>Headers</strong>
            <button data-action="addHeader" type="button">Add header</button>
          </div>
          <div data-role="headers"></div>
        </div>
      </article>
    </template>

    <template id="headerTemplate">
      <div class="header-row">
        <input data-field="headerName" type="text" placeholder="X-Debug-User">
        <input data-field="headerValue" type="text" placeholder="local">
        <button data-action="removeHeader" type="button">Remove</button>
      </div>
    </template>

    <script type="module" src="./options.js"></script>
  </body>
</html>
